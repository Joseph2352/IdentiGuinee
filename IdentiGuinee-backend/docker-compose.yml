version: '3.8'

services:
  db:
    image: postgres:17
    container_name: identiguinee-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identiguinee
    ports:
      - "5432:5432"
    volumes:
      - identiguinee_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identiguinee"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  identiguinee_postgres_data:
